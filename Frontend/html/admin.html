<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoTech – Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css">
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">AUTO<span>TECH</span></div>

      <nav class="sidebar-nav mt-2">
        <a href="#" class="active" onclick="mostrar('inicio', this)"
          > Inicio</a
        >
        <a href="#" onclick="mostrar('citas', this)"> Citas</a>
        <a href="#" onclick="mostrar('vehiculos', this)"> Vehículos</a>
        <a href="#" onclick="mostrar('historial', this)"> Historial</a>
        <a href="#" onclick="mostrar('facturas', this)"> Facturas</a>
        <a href="#" onclick="mostrar('estadisticas', this)"> Estadísticas</a>
      </nav>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- TOPBAR -->
      <div class="topbar">
        <h5 id="titulo-pagina">Inicio</h5>
        <a
          href="login.html"
          style="font-size: 0.85rem; color: #d90429; text-decoration: none"
          >Cerrar sesión</a
        >
      </div>

      <!-- CONTENIDO -->
      <div class="content">
        <div id="sec-inicio" class="seccion active">
          <p class="text-muted">Bienvenido al panel de administración.</p>
        </div>

        <div id="sec-citas" class="seccion">
          <p class="text-muted">Sección de Citas.</p>
        </div>

        <div id="sec-vehiculos" class="seccion">
          <p class="text-muted">Sección de Vehículos.</p>
        </div>

        <div id="sec-historial" class="seccion">
          <p class="text-muted">Sección de Historial.</p>
        </div>

        <div id="sec-facturas" class="seccion">
          <p class="text-muted">Sección de Facturas.</p>
        </div>

        <div id="sec-estadisticas" class="seccion">
          <p class="text-muted">Sección de Estadísticas.</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function mostrar(id, el) {
        // Ocultar todas las secciones
        document
          .querySelectorAll(".seccion")
          .forEach((s) => s.classList.remove("active"));
        // Quitar active del nav
        document
          .querySelectorAll(".sidebar-nav a")
          .forEach((a) => a.classList.remove("active"));
        // Mostrar la sección elegida
        document.getElementById("sec-" + id).classList.add("active");
        // Marcar link activo
        el.classList.add("active");
        // Actualizar título
        document.getElementById("titulo-pagina").textContent =
          el.textContent.trim();
        event.preventDefault();
      }
    </script>
  </body>
</html>
