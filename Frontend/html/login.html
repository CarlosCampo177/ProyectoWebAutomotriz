<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoTech – Iniciar sesión</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/log.css" />
  </head>
  <body>
    <div class="card-login">
      <!-- Logo -->
      <div class="mb-4">
        <span
          style="
            font-family: &quot;Montserrat&quot;, sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            color: #0d3b66;
            letter-spacing: 2px;
          "
        >
          AUTO<span style="color: #d90429">TECH</span>
        </span>
      </div>

      <h2>Bienvenido</h2>
      <p>Inicia sesión para continuar</p>

      <!-- FORMULARIO -->
      <form>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input
            type="email"
            class="form-control"
            placeholder="tu@correo.com"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="••••••••" />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label
              class="form-check-label"
              for="remember"
              style="font-size: 0.85rem"
              >Recordarme</label
            >
          </div>
          <a href="#" class="link-volver">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-entrar">Entrar</button>
      </form>

      <div class="divider"></div>

      <p class="texto-registro">
        ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
      </p>

      <!-- Volver al inicio -->
      <div class="text-center mt-3">
        <a href="index.html" class="link-volver">← Volver al inicio</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
