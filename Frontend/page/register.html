<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoTech – Registrarse</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="card-registro">
      <!-- Logo -->
      <div class="mb-4">
        <span
          style="
            font-family: &quot;Montserrat&quot;, sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            color: #0d3b66;
            letter-spacing: 2px;
          "
        >
          AUTO<span style="color: #d90429">TECH</span>
        </span>
      </div>

      <h2>Crear cuenta</h2>
      <p>Regístrate gratis y comienza hoy</p>

      <!-- FORMULARIO -->
      <form>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Juan" />
          </div>
          <div class="col-6">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" placeholder="Pérez" />
          </div>
        </div>

        <div class="mb-3 mt-3">
          <label class="form-label">Correo electrónico</label>
          <input
            type="email"
            class="form-control"
            placeholder="tu@correo.com"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input
            type="tel"
            class="form-control"
            placeholder="+57 300 000 0000"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="••••••••" />
        </div>

        <div class="mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" placeholder="••••••••" />
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terminos" />
          <label
            class="form-check-label"
            for="terminos"
            style="font-size: 0.85rem"
          >
            Acepto los
            <a href="#" class="link-azul fw-semibold">términos y condiciones</a>
          </label>
        </div>

        <button type="submit" class="btn btn-registrar">Crear cuenta</button>
      </form>

      <div class="divider"></div>

      <p class="texto-login">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>

      <div class="text-center mt-3">
        <a href="../index.html" class="link-azul">← Volver al inicio</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
