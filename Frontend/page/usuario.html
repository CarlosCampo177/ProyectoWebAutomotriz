<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoTech – Panel de Usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/usuario.css" />
  </head>

  <body>

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">

      <div class="sidebar-brand">
        <div class="brand-text">AUTO<span>TECH</span></div>
      </div>

      <div class="user-info">
        <div class="avatar">OA</div>
        <div>
          <div class="name">Oscar Avila</div>
          <div class="role">Cliente</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" href="#">
          <i class="bi bi-grid-1x2"></i> Inicio
        </a>
        <a class="nav-item" href="#">
          <i class="bi bi-car-front"></i> Mis vehículos
        </a>
        <a class="nav-item" href="#">
          <i class="bi bi-calendar-check"></i> Mis citas
        </a>
        <a class="nav-item" href="#">
          <i class="bi bi-clock-history"></i> Historial
        </a>
        <a class="nav-item" href="#">
          <i class="bi bi-receipt"></i> Facturas
        </a>
        <a class="nav-item" href="#">
          <i class="bi bi-person"></i> Perfil
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#">
          <i class="bi bi-box-arrow-left"></i> Cerrar sesión
        </a>
      </div>

    </aside><!-- /sidebar -->

    <!-- ── MAIN ── -->
    <div id="main">

      <!-- TOPBAR -->
      <div class="topbar">
        <span class="page-title">Inicio</span>
        <span class="user-badge">Cliente</span>
      </div>

      <!-- CONTENIDO -->
      <div class="content">

      </div><!-- /content -->

    </div><!-- /main -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/usuario.js"></script>

  </body>
</html>
